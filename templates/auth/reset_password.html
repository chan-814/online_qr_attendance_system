<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – QR Attendance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-icon" style="background:rgba(6,182,212,.15); border:1px solid var(--cyan);">🔒</div>
      <div class="auth-logo-text">
        QR Attendance
        <small>Reset Password</small>
      </div>
    </div>

    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Enter the OTP you received and your new password</p>

    {% if msg %}
    <div class="alert {{ 'alert-success' if msg_type == 'success' else 'alert-error' }}">
      {{ msg }}
    </div>
    {% endif %}

    {% if msg_type == 'success' %}
    <div style="text-align:center; margin-top:1rem;">
      <a href="/" class="btn btn-primary" style="display:inline-flex; width:auto; padding:.75rem 2rem;">
        → Go to Login
      </a>
    </div>
    {% else %}
    <form method="POST">
      <div class="form-group">
        <label>Account Type</label>
        <select name="user_type">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Registered Email</label>
        <input type="email" name="email" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label>OTP Code</label>
        <input type="text" name="otp" placeholder="Enter 6-digit OTP"
               maxlength="6" style="letter-spacing:.2em; font-size:1.2rem; text-align:center;"
               required />
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Minimum 6 characters"
               required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary">Reset Password →</button>
    </form>

    <p class="auth-footer" style="margin-top:1rem;">
      Did not get OTP? <a href="/forgot-password">Request again</a>
    </p>
    {% endif %}

    <p class="auth-footer" style="margin-top:.5rem;">
      <a href="/" style="color:var(--text-muted);">← Back to Home</a>
    </p>

  </div>
</div>
</body>
</html>
