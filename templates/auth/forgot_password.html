<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password – QR Attendance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-icon" style="background:rgba(6,182,212,.15); border:1px solid var(--cyan);">🔑</div>
      <div class="auth-logo-text">
        QR Attendance
        <small>Password Recovery</small>
      </div>
    </div>

    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-subtitle">Enter your registered email to receive an OTP</p>

    {% if msg %}
    <div class="alert {{ 'alert-success' if msg_type == 'success' else 'alert-error' }}">
      {{ msg }}
    </div>
    {% endif %}

    {% if otp_show %}
    <!-- OTP Display Box (for local/WAMP development) -->
    <div style="background:rgba(16,185,129,.12); border:2px dashed var(--green);
                border-radius:var(--radius); padding:1.25rem; text-align:center; margin-bottom:1.5rem;">
      <p style="font-size:.8rem; color:var(--text-muted); margin-bottom:.5rem;">YOUR OTP CODE</p>
      <div style="font-family:var(--font-head); font-size:2.5rem; font-weight:800;
                  color:var(--green); letter-spacing:.3em;">{{ otp_show }}</div>
      <p style="font-size:.75rem; color:var(--text-muted); margin-top:.5rem;">Valid for 10 minutes</p>
    </div>
    <a href="/reset-password" class="btn btn-primary" style="display:flex; margin-bottom:1rem;">
      → Go to Reset Password
    </a>
    {% else %}
    <form method="POST">
      <div class="form-group">
        <label>Account Type</label>
        <select name="user_type">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Registered Email</label>
        <input type="email" name="email" placeholder="your@email.com" required />
      </div>
      <button type="submit" class="btn btn-primary">Get OTP →</button>
    </form>
    {% endif %}

    <p class="auth-footer" style="margin-top:1.25rem;">
      <a href="/" style="color:var(--text-muted);">← Back to Home</a>
    </p>

  </div>
</div>
</body>
</html>
