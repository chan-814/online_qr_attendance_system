<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – QR Attendance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="admin-role">
<div class="auth-page">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-icon" style="background:var(--purple-glow); border:1px solid var(--admin-clr);">⚙️</div>
      <div class="auth-logo-text">
        QR Attendance
        <small>Admin Portal</small>
      </div>
    </div>

    <h1 class="auth-title">Admin Sign In</h1>
    <p class="auth-subtitle">Manage the entire attendance system from one place</p>

    {% if msg %}
    <div class="alert alert-error">{{ msg }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" name="email" placeholder="admin@qrpro.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary">Sign In →</button>
    </form>

    <p class="auth-footer" style="margin-top:1.5rem; padding:.75rem; background:rgba(139,92,246,.08); border:1px solid rgba(139,92,246,.2); border-radius:var(--radius-sm); font-size:.8rem; color:var(--text-soft);">
      Default credentials: <code style="color:var(--admin-clr)">admin@qrpro.com</code> / <code style="color:var(--admin-clr)">admin123</code>
    </p>

    <p class="auth-footer">
      <a href="/" style="color:var(--text-muted);">← Back to Home</a>
    </p>

  </div>
</div>
</body>
</html>
