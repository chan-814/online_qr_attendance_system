<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Register – QR Attendance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="teacher-role">
<div class="auth-page">
  <div class="auth-box wide">

    <div class="auth-logo">
      <div class="auth-logo-icon" style="background:var(--amber-glow); border:1px solid var(--teacher-clr);">🖥️</div>
      <div class="auth-logo-text">
        QR Attendance
        <small>Teacher Registration</small>
      </div>
    </div>

    <h1 class="auth-title">Register as Teacher</h1>
    <p class="auth-subtitle">Create your account to manage classes and generate QR codes</p>

    {% if msg %}
    <div class="alert alert-error">{{ msg }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Dr. Ramesh Kumar" required />
        </div>
        <div class="form-group">
          <label>Teacher ID</label>
          <input type="text" name="teacher_id" placeholder="TCH001" required />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="teacher@school.com" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <input type="text" name="department" placeholder="Computer Science" />
        </div>
        <div class="form-group">
          <label>Assigned Class</label>
          <select name="class_id">
            <option value="">No class assigned</option>
            {% for cls in classes %}
            <option value="{{ cls.id }}">{{ cls.class_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Minimum 6 characters" required minlength="6"/>
      </div>
      <button type="submit" class="btn btn-primary">Create Account →</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="/teacher/login">Sign in</a>
    </p>
    <p class="auth-footer" style="margin-top:.5rem;">
      <a href="/" style="color:var(--text-muted);">← Back to Home</a>
    </p>

  </div>
</div>
</body>
</html>
